<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUDS — Settings</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="hq-body">
    <header class="hq-spa-header">
        <div class="hq-zone1">
            <div class="hq-z1-top">
                <nav class="hq-z1-left">
                    <a href="/hq/" class="hq-portal-link hq-current">HQ</a>
                    <span class="hq-pipe">|</span>
                    <a href="/hq/goto-studio" class="hq-portal-link">STUDIO</a>
                    <span class="hq-pipe">|</span>
                    <a href="/hq/logout" class="hq-portal-link">LOGOUT</a>
                </nav>
                <div class="hq-z1-center">
                    <a href="/hq/" class="hq-logo-link">STUDS</a>
                    <div class="hq-confidential-sub">(CONFIDENTIAL)</div>
                </div>
                <nav class="hq-z1-right">
                    <a href="/hq/upload" class="hq-portal-link">FILES</a>
                    <span class="hq-pipe">|</span>
                    <span class="hq-portal-link hq-current">SETTINGS</span>
                </nav>
            </div>
            <div class="hq-z1-bottom"><div class="hq-z1-bottom-left"></div><div class="hq-z1-bottom-right"></div></div>
        </div>
        <hr class="hq-header-rule">
        <div class="hq-zone2">
            <div class="hq-z2-spacer"></div>
            <nav class="hq-section-nav">
                <a href="/hq/?section=dashboard" class="hq-section-link">DASHBOARD</a>
                <span class="hq-pipe">|</span>
                <a href="/hq/?section=analytics" class="hq-section-link">ANALYTICS</a>
                <span class="hq-pipe">|</span>
                <a href="/hq/?section=database" class="hq-section-link">DATABASE</a>
                <span class="hq-pipe">|</span>
                <a href="/hq/?section=studios" class="hq-section-link">STUDIOS</a>
            </nav>
            <div class="hq-z2-spacer"></div>
        </div>
    </header>

    <div class="hq-page-content">
        <h2 class="hq-section-heading" style="margin-bottom:24px;">Settings</h2>

        <a href="/hq/settings/credentials" class="hq-settings-row">
            <div>
                <div class="hq-settings-row-title">Login Credentials</div>
                <div class="hq-settings-row-desc">Manage per-studio usernames and passwords</div>
            </div>
            <span class="hq-settings-arrow">&rarr;</span>
        </a>

        <a href="/hq/settings/email" class="hq-settings-row">
            <div>
                <div class="hq-settings-row-title">Email</div>
                <div class="hq-settings-row-desc">Customize the email draft template for discrepancy notifications</div>
            </div>
            <span class="hq-settings-arrow">&rarr;</span>
        </a>
    </div>
</body>
</html>
