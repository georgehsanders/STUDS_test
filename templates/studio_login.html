<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUDS — Studio Login</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="portal-login-body">
    <div class="portal-login-container">
        <h1 class="portal-login-title">STUDIO</h1>
        <div class="portal-confidential">CONFIDENTIAL</div>
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        <div class="warnings">
            {% for category, message in messages %}
            <div class="warning-item {% if category == 'lockout' %}warning-lockout{% endif %}">{{ message }}</div>
            {% endfor %}
        </div>
        {% endif %}
        {% endwith %}
        <form method="POST" class="portal-login-form">
            <input type="text" name="username" placeholder="Username" autofocus required autocomplete="username">
            <input type="password" name="password" placeholder="Password" required autocomplete="current-password">
            <button type="submit">Enter</button>
        </form>
        <a href="/" class="portal-back-link">&larr; Back</a>
    </div>
</body>
</html>
